# Local development stack.
# - Host ports published so you can connect from your IDE / curl / a host-side Vite.
# - DEBUG=true (no HTTPS redirect, verbose errors).
# - Source bind-mounted with hot reload (uvicorn --reload, vite).
# - Anonymous volumes preserve /app/.venv and /app/node_modules built into the images.

services:
  denarly_db:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - denarly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  denarly_redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - denarly-network
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  denarly_storage_init:
    image: busybox:1.37
    container_name: denarly_storage_init
    volumes:
      - rustfs_data_dev:/data
    command: chown -R 10001:10001 /data
    restart: "no"

  denarly_storage:
    image: rustfs/rustfs:latest
    container_name: denarly_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
    volumes:
      - rustfs_data_dev:/data
    networks:
      denarly-network:
        aliases:
          - rustfs
    depends_on:
      denarly_storage_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  denarly_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: denarly_api
    user: root
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=true
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
      - REDIS_URL=redis://denarly_redis:6379
      - USE_S3_STORAGE=true
      - S3_ENDPOINT_URL=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
      - S3_BUCKET_STATIC=denarly-static
      - S3_BUCKET_MEDIA=denarly-media
      - S3_BUCKET_LOGS=denarly-logs
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    networks:
      - denarly-network
    depends_on:
      denarly_db:
        condition: service_healthy
      denarly_redis:
        condition: service_healthy
      denarly_storage:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        echo "Running database migrations..."
        uv run python manage.py migrate --noinput
        echo "Seeding legal documents..."
        uv run python manage.py seed_legal_documents
        if [ "$$USE_S3_STORAGE" = "true" ]; then
          echo "Initializing storage buckets..."
          uv run python manage.py init_storage_buckets
        fi
        if [ "$$USE_S3_STORAGE" = "true" ]; then
          echo "Collecting static files to S3..."
          uv run python manage.py collectstatic --noinput
        fi
        echo "Starting dev server (autoreload)..."
        exec uv run uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload

  denarly_ui:
    image: node:22-alpine
    working_dir: /app
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
      - VITE_DEMO_MODE=${VITE_DEMO_MODE:-false}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    networks:
      - denarly-network
    depends_on:
      - denarly_api

volumes:
  postgres_data_dev:
  redis_data_dev:
  rustfs_data_dev:
  backend_venv:
  frontend_node_modules:

networks:
  denarly-network:
    driver: bridge
